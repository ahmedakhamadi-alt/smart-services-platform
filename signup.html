<!DOCTYPE html>\n<html lang="ar">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Signup Form</title>\n    <style>\n        body { direction: rtl; font-family: "Arial", sans-serif; }\n        form { max-width: 600px; margin: 20px auto; padding: 20px; border: 1px solid #ccc; border-radius: 5px; }\n        input[type='text'], input[type='email'], input[type='password'], select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }\n        button { padding: 10px 15px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }\n        button:hover { background-color: #218838; }\n    </style>\n</head>\n<body>\n    <h2>نموذج التسجيل</h2>\n    <form action="#" method="post">\n        <label for="username">اسم المستخدم:</label>\n        <input type="text" id="username" name="username" required>\n\n        <label for="email">البريد الإلكتروني:</label>\n        <input type="email" id="email" name="email" required>\n\n        <label for="password">كلمة المرور:</label>\n        <input type="password" id="password" name="password" required>\n\n        <label for="role">حدد الدور:</label>\n        <select id="role" name="role" required>\n            <option value="customer">عميل</option>\n            <option value="provider">مقدم الخدمة</option>\n            <option value="admin">مدير</option>\n        </select>\n\n        <button type="submit">تسجيل</button>\n    </form>\n</body>\n</html>\n
